<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 320" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="subGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2D3748"/>
      <stop offset="100%" stop-color="#4A5568"/>
    </linearGradient>
    <linearGradient id="bassGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2B6CB0"/>
      <stop offset="100%" stop-color="#3182CE"/>
    </linearGradient>
    <linearGradient id="midGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#319795"/>
      <stop offset="100%" stop-color="#38B2AC"/>
    </linearGradient>
    <linearGradient id="upMidGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#805AD5"/>
      <stop offset="100%" stop-color="#9F7AEA"/>
    </linearGradient>
    <linearGradient id="highGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#DD6B20"/>
      <stop offset="100%" stop-color="#ED8936"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="410" y="35" text-anchor="middle" font-size="22" font-weight="700" fill="#1A202C">The Frequency Spectrum</text>
  <text x="410" y="55" text-anchor="middle" font-size="13" fill="#718096" font-style="italic">How we describe tonal regions in mixing</text>

  <!-- Frequency labels (top) -->
  <text x="60" y="88" text-anchor="middle" font-size="11" font-weight="600" fill="#4A5568">20 Hz</text>
  <text x="165" y="88" text-anchor="middle" font-size="11" font-weight="600" fill="#4A5568">60 Hz</text>
  <text x="300" y="88" text-anchor="middle" font-size="11" font-weight="600" fill="#4A5568">250 Hz</text>
  <text x="472" y="88" text-anchor="middle" font-size="11" font-weight="600" fill="#4A5568">2 kHz</text>
  <text x="600" y="88" text-anchor="middle" font-size="11" font-weight="600" fill="#4A5568">6 kHz</text>
  <text x="760" y="88" text-anchor="middle" font-size="11" font-weight="600" fill="#4A5568">20 kHz</text>

  <!-- Main spectrum bar -->
  <!-- Sub -->
  <rect x="40" y="100" width="105" height="60" rx="6" ry="6" fill="url(#subGrad)"/>
  <text x="92" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">SUB</text>
  <text x="92" y="146" text-anchor="middle" font-size="10" fill="#CBD5E0">20 - 60 Hz</text>

  <!-- Bass -->
  <rect x="148" y="100" width="150" height="60" rx="6" ry="6" fill="url(#bassGrad)"/>
  <text x="223" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">BASS</text>
  <text x="223" y="146" text-anchor="middle" font-size="10" fill="#BEE3F8">60 - 250 Hz</text>

  <!-- Mids -->
  <rect x="301" y="100" width="168" height="60" rx="6" ry="6" fill="url(#midGrad)"/>
  <text x="385" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">MIDS</text>
  <text x="385" y="146" text-anchor="middle" font-size="10" fill="#B2F5EA">250 Hz - 2 kHz</text>

  <!-- Upper Mids -->
  <rect x="472" y="100" width="125" height="60" rx="6" ry="6" fill="url(#upMidGrad)"/>
  <text x="534" y="122" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">UPPER</text>
  <text x="534" y="138" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">MIDS</text>
  <text x="534" y="153" text-anchor="middle" font-size="10" fill="#E9D8FD">2 - 6 kHz</text>

  <!-- Highs -->
  <rect x="600" y="100" width="180" height="60" rx="6" ry="6" fill="url(#highGrad)"/>
  <text x="690" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">HIGHS</text>
  <text x="690" y="146" text-anchor="middle" font-size="10" fill="#FEEBC8">6 - 20 kHz</text>

  <!-- Description labels (below bar) -->
  <!-- Sub -->
  <text x="92" y="185" text-anchor="middle" font-size="12" font-weight="600" fill="#2D3748">Felt more</text>
  <text x="92" y="200" text-anchor="middle" font-size="12" font-weight="600" fill="#2D3748">than heard</text>
  <text x="92" y="222" text-anchor="middle" font-size="10.5" fill="#718096">Rumble, sub-bass</text>
  <text x="92" y="236" text-anchor="middle" font-size="10.5" fill="#718096">energy</text>

  <!-- Bass -->
  <text x="223" y="185" text-anchor="middle" font-size="12" font-weight="600" fill="#2B6CB0">Warmth</text>
  <text x="223" y="200" text-anchor="middle" font-size="12" font-weight="600" fill="#2B6CB0">Fullness</text>
  <text x="223" y="222" text-anchor="middle" font-size="10.5" fill="#718096">Bass guitar, kick</text>
  <text x="223" y="236" text-anchor="middle" font-size="10.5" fill="#718096">drum body</text>

  <!-- Mids -->
  <text x="385" y="185" text-anchor="middle" font-size="12" font-weight="600" fill="#319795">Body</text>
  <text x="385" y="200" text-anchor="middle" font-size="12" font-weight="600" fill="#319795">Character</text>
  <text x="385" y="222" text-anchor="middle" font-size="10.5" fill="#718096">Vocal fundamentals,</text>
  <text x="385" y="236" text-anchor="middle" font-size="10.5" fill="#718096">guitar tone</text>

  <!-- Upper Mids -->
  <text x="534" y="185" text-anchor="middle" font-size="12" font-weight="600" fill="#805AD5">Presence</text>
  <text x="534" y="200" text-anchor="middle" font-size="12" font-weight="600" fill="#805AD5">Clarity, Bite</text>
  <text x="534" y="222" text-anchor="middle" font-size="10.5" fill="#718096">Vocal intelligibility,</text>
  <text x="534" y="236" text-anchor="middle" font-size="10.5" fill="#718096">guitar attack</text>

  <!-- Highs -->
  <text x="690" y="185" text-anchor="middle" font-size="12" font-weight="600" fill="#DD6B20">Air</text>
  <text x="690" y="200" text-anchor="middle" font-size="12" font-weight="600" fill="#DD6B20">Sparkle, Detail</text>
  <text x="690" y="222" text-anchor="middle" font-size="10.5" fill="#718096">Cymbals, vocal</text>
  <text x="690" y="236" text-anchor="middle" font-size="10.5" fill="#718096">breathiness, sibilance</text>

  <!-- Arrow below -->
  <line x1="60" y1="275" x2="760" y2="275" stroke="#CBD5E0" stroke-width="1.5"/>
  <polygon points="755,271 765,275 755,279" fill="#CBD5E0"/>
  <polygon points="65,271 55,275 65,279" fill="#CBD5E0"/>
  <text x="100" y="295" font-size="11" fill="#A0AEC0">Lower frequencies</text>
  <text x="660" y="295" font-size="11" fill="#A0AEC0" text-anchor="end">Higher frequencies</text>
  <text x="410" y="295" font-size="11" fill="#A0AEC0" text-anchor="middle">Logarithmic scale</text>
</svg>