<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 490" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrow-gr" viewBox="0 0 6 10" refX="3" refY="10" markerWidth="6" markerHeight="10" orient="auto">
      <polygon points="0 0, 3 10, 6 0" fill="#E53E3E"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="410" y="32" text-anchor="middle" font-size="22" font-weight="700" fill="#1A202C">The Compression Curve</text>
  <text x="410" y="52" text-anchor="middle" font-size="13" fill="#718096" font-style="italic">How ratio controls gain reduction above the threshold</text>

  <!--
    Graph area: x=140..500, y=70..430 (360x360)
    Scale: 6 px/dB, range -60 to 0 dB on both axes
    dB → x: 140 + (d+60)*6
    dB → y: 430 - (d+60)*6
    Threshold: -20 dB → (380, 190)
  -->

  <!-- Graph background -->
  <rect x="140" y="70" width="360" height="360" rx="0" fill="#F7FAFC" stroke="#CBD5E0" stroke-width="1"/>

  <!-- Grid lines (every 10 dB) -->
  <line x1="200" y1="70" x2="200" y2="430" stroke="#EDF2F7" stroke-width="1"/>
  <line x1="260" y1="70" x2="260" y2="430" stroke="#EDF2F7" stroke-width="1"/>
  <line x1="320" y1="70" x2="320" y2="430" stroke="#EDF2F7" stroke-width="1"/>
  <line x1="380" y1="70" x2="380" y2="430" stroke="#EDF2F7" stroke-width="1"/>
  <line x1="440" y1="70" x2="440" y2="430" stroke="#EDF2F7" stroke-width="1"/>

  <line x1="140" y1="370" x2="500" y2="370" stroke="#EDF2F7" stroke-width="1"/>
  <line x1="140" y1="310" x2="500" y2="310" stroke="#EDF2F7" stroke-width="1"/>
  <line x1="140" y1="250" x2="500" y2="250" stroke="#EDF2F7" stroke-width="1"/>
  <line x1="140" y1="190" x2="500" y2="190" stroke="#EDF2F7" stroke-width="1"/>
  <line x1="140" y1="130" x2="500" y2="130" stroke="#EDF2F7" stroke-width="1"/>

  <!-- Axis tick labels -->
  <text x="200" y="445" text-anchor="middle" font-size="9" fill="#A0AEC0">-50</text>
  <text x="260" y="445" text-anchor="middle" font-size="9" fill="#A0AEC0">-40</text>
  <text x="320" y="445" text-anchor="middle" font-size="9" fill="#A0AEC0">-30</text>
  <text x="380" y="445" text-anchor="middle" font-size="9" fill="#A0AEC0">-20</text>
  <text x="440" y="445" text-anchor="middle" font-size="9" fill="#A0AEC0">-10</text>
  <text x="500" y="445" text-anchor="middle" font-size="9" fill="#A0AEC0">0</text>

  <text x="132" y="374" text-anchor="end" font-size="9" fill="#A0AEC0">-50</text>
  <text x="132" y="314" text-anchor="end" font-size="9" fill="#A0AEC0">-40</text>
  <text x="132" y="254" text-anchor="end" font-size="9" fill="#A0AEC0">-30</text>
  <text x="132" y="194" text-anchor="end" font-size="9" fill="#A0AEC0">-20</text>
  <text x="132" y="134" text-anchor="end" font-size="9" fill="#A0AEC0">-10</text>
  <text x="132" y="74" text-anchor="end" font-size="9" fill="#A0AEC0">0</text>

  <!-- Axis labels -->
  <text x="320" y="472" text-anchor="middle" font-size="11" font-weight="600" fill="#4A5568">Input Level (dB)</text>
  <text x="68" y="250" text-anchor="middle" font-size="11" font-weight="600" fill="#4A5568" transform="rotate(-90 68 250)">Output Level (dB)</text>

  <!-- Threshold lines -->
  <line x1="380" y1="70" x2="380" y2="430" stroke="#E53E3E" stroke-width="1.2" stroke-dasharray="6,4" opacity="0.5"/>
  <line x1="140" y1="190" x2="500" y2="190" stroke="#E53E3E" stroke-width="1.2" stroke-dasharray="6,4" opacity="0.5"/>
  <text x="383" y="428" font-size="9" font-weight="600" fill="#E53E3E">Threshold</text>

  <!-- 1:1 reference line (no compression) -->
  <line x1="140" y1="430" x2="500" y2="70" stroke="#CBD5E0" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="504" y="74" font-size="10" fill="#CBD5E0" font-weight="600">1:1</text>

  <!-- All ratio lines share the same path below threshold -->
  <!-- Below threshold: from (-60,-60) to (-20,-20) = (140,430) to (380,190) -->

  <!--
    Above threshold endpoint calculations at 0 dB input (x=500):
    2:1  → output = -20 + 20/2  = -10 dB → y = 130
    4:1  → output = -20 + 20/4  = -15 dB → y = 160
    10:1 → output = -20 + 20/10 = -18 dB → y = 178 (use 180)
    ∞:1  → output = -20 + 0     = -20 dB → y = 190
  -->

  <!-- 2:1 line (gentle) -->
  <polyline points="140,430 380,190 500,130" stroke="#3182CE" stroke-width="2.5" fill="none"/>
  <text x="504" y="134" font-size="11" font-weight="700" fill="#3182CE">2:1</text>

  <!-- 4:1 line (moderate) -->
  <polyline points="140,430 380,190 500,160" stroke="#805AD5" stroke-width="2.5" fill="none"/>
  <text x="504" y="164" font-size="11" font-weight="700" fill="#805AD5">4:1</text>

  <!-- 10:1 line (heavy) -->
  <polyline points="140,430 380,190 500,178" stroke="#DD6B20" stroke-width="2.5" fill="none"/>
  <text x="504" y="182" font-size="11" font-weight="700" fill="#DD6B20">10:1</text>

  <!-- ∞:1 line (limiting) -->
  <polyline points="140,430 380,190 500,190" stroke="#E53E3E" stroke-width="2.5" fill="none"/>
  <text x="504" y="194" font-size="11" font-weight="700" fill="#E53E3E">∞:1</text>

  <!-- Threshold dot -->
  <circle cx="380" cy="190" r="4" fill="#1A202C"/>

  <!-- Gain Reduction annotation at -10 dB input -->
  <!-- 1:1 output at -10 dB input: y=130 -->
  <!-- 4:1 output at -10 dB input: -20 + 10/4 = -17.5 dB → y = 430 - 42.5*6 = 175 -->
  <line x1="440" y1="132" x2="440" y2="173" stroke="#E53E3E" stroke-width="1.5"/>
  <polygon points="436,170 440,180 444,170" fill="#E53E3E"/>
  <polygon points="436,135 440,128 444,135" fill="#E53E3E"/>
  <text x="448" y="150" font-size="9" font-weight="600" fill="#E53E3E">Gain</text>
  <text x="448" y="161" font-size="9" font-weight="600" fill="#E53E3E">Reduction</text>
  <text x="448" y="172" font-size="9" fill="#718096">(7.5 dB at 4:1)</text>

  <!-- ============================================================ -->
  <!-- Right-side ratio descriptions -->
  <!-- ============================================================ -->

  <line x1="540" y1="90" x2="540" y2="410" stroke="#E2E8F0" stroke-width="1"/>

  <!-- 2:1 -->
  <rect x="560" y="90" width="240" height="62" rx="6" fill="#EBF8FF" stroke="#BEE3F8" stroke-width="1"/>
  <text x="580" y="110" font-size="12" font-weight="700" fill="#3182CE">2:1 — Gentle</text>
  <text x="580" y="126" font-size="10" fill="#4A5568">Subtle dynamic control.</text>
  <text x="580" y="140" font-size="10" fill="#4A5568">Vocals, acoustic instruments.</text>

  <!-- 4:1 -->
  <rect x="560" y="166" width="240" height="62" rx="6" fill="#FAF5FF" stroke="#E9D8FD" stroke-width="1"/>
  <text x="580" y="186" font-size="12" font-weight="700" fill="#805AD5">4:1 — Moderate</text>
  <text x="580" y="202" font-size="10" fill="#4A5568">Noticeable compression.</text>
  <text x="580" y="216" font-size="10" fill="#4A5568">Drums, bass, mix bus.</text>

  <!-- 10:1 -->
  <rect x="560" y="242" width="240" height="62" rx="6" fill="#FFFAF0" stroke="#FEEBC8" stroke-width="1"/>
  <text x="580" y="262" font-size="12" font-weight="700" fill="#DD6B20">10:1 — Heavy</text>
  <text x="580" y="278" font-size="10" fill="#4A5568">Aggressive compression.</text>
  <text x="580" y="292" font-size="10" fill="#4A5568">Parallel compression, effect use.</text>

  <!-- ∞:1 -->
  <rect x="560" y="318" width="240" height="62" rx="6" fill="#FFF5F5" stroke="#FED7D7" stroke-width="1"/>
  <text x="580" y="338" font-size="12" font-weight="700" fill="#E53E3E">∞:1 — Limiting</text>
  <text x="580" y="354" font-size="10" fill="#4A5568">Output never exceeds threshold.</text>
  <text x="580" y="368" font-size="10" fill="#4A5568">Loudness maximizing, protection.</text>

  <!-- Reading the curve -->
  <text x="560" y="410" font-size="10" font-weight="600" fill="#4A5568">Reading the curve:</text>
  <text x="560" y="425" font-size="10" fill="#718096">For every dB the input rises above</text>
  <text x="560" y="439" font-size="10" fill="#718096">the threshold, the output rises by</text>
  <text x="560" y="453" font-size="10" fill="#718096">only 1/ratio dB. At 4:1, a 20 dB</text>
  <text x="560" y="467" font-size="10" fill="#718096">increase becomes only 5 dB out.</text>
</svg>