<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 340" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="panGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3182CE" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#3182CE" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="410" y="32" text-anchor="middle" font-size="22" font-weight="700" fill="#1A202C">Panning — Stereo Placement</text>

  <!-- Background field -->
  <rect x="60" y="50" width="700" height="195" rx="10" fill="url(#panGrad)" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Main axis line -->
  <line x1="80" y1="148" x2="740" y2="148" stroke="#CBD5E0" stroke-width="2"/>

  <!-- Tick marks -->
  <line x1="110" y1="143" x2="110" y2="153" stroke="#CBD5E0" stroke-width="2"/>
  <line x1="410" y1="138" x2="410" y2="158" stroke="#1A202C" stroke-width="2.5"/>
  <line x1="710" y1="143" x2="710" y2="153" stroke="#CBD5E0" stroke-width="2"/>

  <!-- Position labels -->
  <text x="110" y="262" text-anchor="middle" font-size="12" font-weight="700" fill="#4A5568">HARD LEFT</text>
  <text x="410" y="262" text-anchor="middle" font-size="12" font-weight="700" fill="#1A202C">CENTRE</text>
  <text x="710" y="262" text-anchor="middle" font-size="12" font-weight="700" fill="#4A5568">HARD RIGHT</text>

  <!-- === FAR / top === -->
  <!-- Texture L -->
  <g filter="url(#shadow)">
    <rect x="115" y="64" width="72" height="22" rx="11" fill="#319795"/>
  </g>
  <text x="151" y="79" text-anchor="middle" font-size="9.5" font-weight="600" fill="#FFF">Texture</text>

  <!-- Texture R -->
  <g filter="url(#shadow)">
    <rect x="630" y="64" width="72" height="22" rx="11" fill="#319795"/>
  </g>
  <text x="666" y="79" text-anchor="middle" font-size="9.5" font-weight="600" fill="#FFF">Texture</text>

  <!-- Secondary L -->
  <g filter="url(#shadow)">
    <rect x="200" y="95" width="100" height="22" rx="11" fill="#D53F8C"/>
  </g>
  <text x="250" y="110" text-anchor="middle" font-size="9.5" font-weight="600" fill="#FFF">Secondary (L)</text>

  <!-- Secondary R -->
  <g filter="url(#shadow)">
    <rect x="515" y="95" width="100" height="22" rx="11" fill="#D53F8C"/>
  </g>
  <text x="565" y="110" text-anchor="middle" font-size="9.5" font-weight="600" fill="#FFF">Secondary (R)</text>

  <!-- === MID / near axis === -->
  <!-- Harmony L -->
  <g filter="url(#shadow)">
    <rect x="142" y="125" width="100" height="26" rx="13" fill="#805AD5"/>
  </g>
  <text x="192" y="143" text-anchor="middle" font-size="10.5" font-weight="600" fill="#FFF">Harmony (L)</text>
  <line x1="192" y1="151" x2="192" y2="168" stroke="#805AD5" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Percussion L -->
  <g filter="url(#shadow)">
    <rect x="90" y="125" width="48" height="22" rx="11" fill="#DD6B20"/>
  </g>
  <text x="114" y="140" text-anchor="middle" font-size="9" font-weight="600" fill="#FFF">Perc</text>
  <line x1="114" y1="147" x2="114" y2="168" stroke="#DD6B20" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Harmony R -->
  <g filter="url(#shadow)">
    <rect x="570" y="125" width="100" height="26" rx="13" fill="#805AD5"/>
  </g>
  <text x="620" y="143" text-anchor="middle" font-size="10.5" font-weight="600" fill="#FFF">Harmony (R)</text>
  <line x1="620" y1="151" x2="620" y2="168" stroke="#805AD5" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Percussion R -->
  <g filter="url(#shadow)">
    <rect x="680" y="125" width="48" height="22" rx="11" fill="#DD6B20"/>
  </g>
  <text x="704" y="140" text-anchor="middle" font-size="9" font-weight="600" fill="#FFF">Perc</text>
  <line x1="704" y1="147" x2="704" y2="168" stroke="#DD6B20" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- === CLOSE / bottom === -->
  <!-- Rhythm (centre) -->
  <g filter="url(#shadow)">
    <rect x="418" y="170" width="72" height="22" rx="11" fill="#DD6B20"/>
  </g>
  <text x="454" y="185" text-anchor="middle" font-size="9.5" font-weight="700" fill="#FFF">Rhythm</text>

  <!-- Bass -->
  <g filter="url(#shadow)">
    <rect x="356" y="170" width="52" height="22" rx="11" fill="#2B6CB0"/>
  </g>
  <text x="382" y="185" text-anchor="middle" font-size="9.5" font-weight="700" fill="#FFF">Bass</text>

  <!-- Lead -->
  <g filter="url(#shadow)">
    <rect x="365" y="200" width="90" height="30" rx="15" fill="#E53E3E"/>
  </g>
  <text x="410" y="220" text-anchor="middle" font-size="12" font-weight="700" fill="#FFF">Lead</text>
  <line x1="410" y1="158" x2="410" y2="198" stroke="#E53E3E" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- Legend -->
  <rect x="95" y="280" width="14" height="14" rx="3" fill="#E53E3E"/>
  <text x="115" y="292" font-size="10.5" fill="#4A5568">Lead / Bass: Centre</text>

  <rect x="265" y="280" width="14" height="14" rx="3" fill="#805AD5"/>
  <text x="285" y="292" font-size="10.5" fill="#4A5568">Harmony: Spread L/R</text>

  <rect x="440" y="280" width="14" height="14" rx="3" fill="#DD6B20"/>
  <text x="460" y="292" font-size="10.5" fill="#4A5568">Rhythm / Percussion</text>

  <rect x="615" y="280" width="14" height="14" rx="3" fill="#319795"/>
  <text x="635" y="292" font-size="10.5" fill="#4A5568">Texture / Atmosphere</text>

  <!-- Guidance text -->
  <text x="410" y="322" text-anchor="middle" font-size="11" fill="#A0AEC0">Centre: the foundation (lead, bass, primary rhythm). Sides: width and interest.</text>
  <text x="410" y="337" text-anchor="middle" font-size="11" fill="#A0AEC0">Always check in mono — if panned elements disappear, there may be phase issues.</text>
</svg>