<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 380" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <clipPath id="clipLeft">
      <rect x="50" y="100" width="320" height="180"/>
    </clipPath>
    <clipPath id="clipRight">
      <rect x="450" y="100" width="320" height="180"/>
    </clipPath>
  </defs>

  <!-- Title -->
  <text x="410" y="35" text-anchor="middle" font-size="22" font-weight="700" fill="#1A202C">How Compression Works</text>
  <text x="410" y="55" text-anchor="middle" font-size="13" fill="#718096" font-style="italic">Reducing the difference between loud and quiet</text>

  <!-- LEFT PANEL: Input Signal -->
  <text x="210" y="85" text-anchor="middle" font-size="15" font-weight="700" fill="#2B6CB0">Input Signal</text>

  <!-- Panel background -->
  <rect x="50" y="100" width="320" height="180" rx="8" fill="#F7FAFC" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Centre line -->
  <line x1="50" y1="190" x2="370" y2="190" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Threshold line -->
  <line x1="50" y1="140" x2="370" y2="140" stroke="#E53E3E" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.7"/>
  <text x="55" y="135" font-size="9" fill="#E53E3E" font-weight="600">THRESHOLD</text>
  <line x1="50" y1="240" x2="370" y2="240" stroke="#E53E3E" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.7"/>

  <!-- Input waveform (wide dynamic range) -->
  <path d="M 60,190
    Q 75,190 80,165 Q 85,140 90,120 Q 95,100 100,115 Q 105,130 110,150
    Q 115,170 120,190 Q 125,210 130,230 Q 135,250 140,265 Q 145,280 150,255
    Q 155,230 160,190
    Q 165,190 170,175 Q 175,160 180,150 Q 185,140 190,155 Q 195,170 200,190
    Q 205,210 210,225 Q 215,240 220,220 Q 225,200 230,190
    Q 235,190 240,160 Q 245,130 250,110 Q 255,90 260,115 Q 265,140 270,160
    Q 275,180 280,190 Q 285,200 290,235 Q 295,270 300,260 Q 305,250 310,220
    Q 315,200 320,190
    Q 325,180 330,170 Q 335,160 340,175 Q 345,190 350,190 Q 355,190 360,190"
    stroke="#3182CE" stroke-width="2" fill="none" clip-path="url(#clipLeft)"/>

  <!-- Peak annotations -->
  <line x1="95" y1="108" x2="95" y2="140" stroke="#E53E3E" stroke-width="1" opacity="0.4"/>
  <line x1="252" y1="108" x2="252" y2="140" stroke="#E53E3E" stroke-width="1" opacity="0.4"/>

  <!-- Label -->
  <text x="210" y="305" text-anchor="middle" font-size="12" fill="#4A5568" font-weight="600">Wide dynamic range</text>
  <text x="210" y="322" text-anchor="middle" font-size="11" fill="#718096">Peaks much louder than quiet parts</text>

  <!-- Arrow between panels -->
  <polygon points="395,190 420,178 420,185 440,185 440,195 420,195 420,202" fill="#CBD5E0"/>

  <!-- RIGHT PANEL: Output Signal -->
  <text x="610" y="85" text-anchor="middle" font-size="15" font-weight="700" fill="#38A169">Output Signal (Compressed)</text>

  <!-- Panel background -->
  <rect x="450" y="100" width="320" height="180" rx="8" fill="#F0FFF4" stroke="#C6F6D5" stroke-width="1"/>

  <!-- Centre line -->
  <line x1="450" y1="190" x2="770" y2="190" stroke="#C6F6D5" stroke-width="1"/>

  <!-- Threshold line -->
  <line x1="450" y1="140" x2="770" y2="140" stroke="#E53E3E" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.7"/>
  <text x="455" y="135" font-size="9" fill="#E53E3E" font-weight="600">THRESHOLD</text>
  <line x1="450" y1="240" x2="770" y2="240" stroke="#E53E3E" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.7"/>

  <!-- Output waveform (compressed: peaks reduced, quiet parts similar) -->
  <path d="M 460,190
    Q 475,190 480,172 Q 485,155 490,142 Q 495,130 500,140 Q 505,150 510,162
    Q 515,175 520,190 Q 525,205 530,218 Q 535,230 540,243 Q 545,255 550,240
    Q 555,222 560,190
    Q 565,190 570,180 Q 575,170 580,162 Q 585,155 590,165 Q 595,175 600,190
    Q 605,205 610,215 Q 615,225 620,212 Q 625,200 630,190
    Q 635,190 640,168 Q 645,148 650,138 Q 655,128 660,140 Q 665,152 670,168
    Q 675,182 680,190 Q 685,198 690,220 Q 695,242 700,238 Q 705,232 710,212
    Q 715,200 720,190
    Q 725,182 730,176 Q 735,170 740,180 Q 745,190 750,190 Q 755,190 760,190"
    stroke="#38A169" stroke-width="2" fill="none" clip-path="url(#clipRight)"/>

  <!-- Gain reduction indicators -->
  <line x1="495" y1="130" x2="495" y2="142" stroke="#38A169" stroke-width="2" opacity="0.5"/>
  <text x="498" y="128" font-size="8" fill="#38A169">GR</text>

  <line x1="652" y1="128" x2="652" y2="138" stroke="#38A169" stroke-width="2" opacity="0.5"/>
  <text x="655" y="126" font-size="8" fill="#38A169">GR</text>

  <!-- Label -->
  <text x="610" y="305" text-anchor="middle" font-size="12" fill="#4A5568" font-weight="600">Narrower dynamic range</text>
  <text x="610" y="322" text-anchor="middle" font-size="11" fill="#718096">Peaks reduced toward quiet parts</text>

  <!-- Bottom caption -->
  <text x="410" y="360" text-anchor="middle" font-size="11" fill="#A0AEC0">Compression reduces signal above the threshold. Makeup gain restores perceived volume.</text>
</svg>